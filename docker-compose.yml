version: '3.8'

services:
  # 配置Redis
  redis:
    image: redis:7.0
    container_name: appoint_redis
    ports:
      - "6379:6379"
  # AOF 持久化
    command: redis-server --appendonly yes
    restart: always

  # 配置RabbitMQ (带可视化控制台版本)
  rabbitmq:
  #-management在浏览器里直观看到死信队列的状态
    image: rabbitmq:3.12-management
    container_name: appoint_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # 浏览器可视化控制台端口 
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DATABASE}"
    restart: always

  # 配置MySQL
  mysql:
    image: mysql:8.0
    container_name: appoint_mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql      # 保证容器删除但数据还在
    # 解决高并发下的时区和连接问题
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+08:00'
    restart: always

volumes:
  mysql_data:
