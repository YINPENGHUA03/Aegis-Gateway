services:
  # 配置Redis
  redis:
    image: redis:7.0
    container_name: appoint_redis
    ports:
      - "6379:6379"
  # AOF 持久化
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    restart: always
    healthcheck:
      test: ["CMD","redis-cli","-a","${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # 配置RabbitMQ (带可视化控制台版本)
  rabbitmq:
  #-management在浏览器里直观看到死信队列的状态
    image: rabbitmq:3.12-management
    container_name: appoint_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" # 浏览器可视化控制台端口 
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    restart: always

  # 配置MySQL
  mysql:
    image: mysql:8.0
    container_name: appoint_mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql      # 保证容器删除但数据还在
    # 解决高并发下的时区和连接问题
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone='+08:00'
    restart: always
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  aegis-gateway:
    build: .
    container_name: aegis_gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql:
         condition: service_healthy
      redis:
          condition: service_healthy
      rabbitmq:
          condition: service_started
    restart: on-failure

volumes:
  mysql_data: # 向 Docker 申请一块名叫 mysql_data 的移动硬盘