name: Go Backend CI

# 触发器 (When)
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7.0
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 3s
                    --health-retries 5

        steps:
        - name: Checkout Source Code
          uses: actions/checkout@v4

        - name: Set up Go
          uses: actions/setup-go@v5
          with:
            go-version: '1.26'

        - name: Download Dependencies
          run:  go mod download
        
        - name: Build
         # ./ 是当前目录，... 是"递归所有子包"的通配符
          run:  go build -v ./...

        - name: Test and Race Detector
          # -v: 打印详细日志
          # -race: 开启数据竞争检测
          run: go test -v -race ./...
