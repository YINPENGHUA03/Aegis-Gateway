# 生产环境 compose 文件
# 与 docker-compose.yml 的核心区别：
#   - aegis-gateway 用 image: 拉已构建好的镜像，不用 build:
#   - 配置全部从 .env.prod 读
#   - 基础设施加上 volume 防止重启后丢数据

services:
  redis:
    image: redis:7.0
    container_name: appoint_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: appoint_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  mysql:
    image: mariadb:10.11
    container_name: appoint_mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=+08:00
    restart: always
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  aegis-gateway:
    # 镜像由 CI 推到 ghcr.io，部署时由 .env.prod 提供 IMAGE_REPO 和 IMAGE_TAG
    image: ${IMAGE_REPO}:${IMAGE_TAG}
    container_name: aegis_gateway
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    restart: on-failure

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
